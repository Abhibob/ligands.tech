services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bindops
      POSTGRES_USER: bind
      POSTGRES_PASSWORD: bind
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bind -d bindops"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
